}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 3px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  background: #161616;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* CAPA */
.cover {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 15px;
}

.title {
  font-size: 16px;
  margin-bottom: 10px;
}

/* PLAYER */
audio {
  width: 100%;
  margin-top: 10px;
}

/* BOTÕES */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  text-align: center;
  text-decoration: none;
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

.download {
  background: #ff0033;
}

.download:hover {
  background: #cc0029;
}

.whatsapp {
  background: #25D366;
}

.whatsapp:hover {

}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
  font-size: 12px;
}
</style>
</head>
